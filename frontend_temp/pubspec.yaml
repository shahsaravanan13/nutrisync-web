name: nutrisyncproject
description: "NutriSync - AI-Powered Recipe & Nutrition App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  shared_preferences: ^2.3.4
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1
  flutter_staggered_animations: ^1.1.1
  share_plus: ^10.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

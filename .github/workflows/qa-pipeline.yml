name: Quality Assurance & Automated Testing

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  security-scan:
    name: Codebase Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: false
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'

      - name: Upload Trivy Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json
          retention-days: 1

  web-test:
    name: Web UI Regression Testing (Selenium)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        working-directory: frontend_temp
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: frontend_temp
        run: flutter build web --release

      - name: Start Web Server
        run: |
          nohup python3 -m http.server 3000 --directory frontend_temp/build/web > web_server.log 2>&1 &
          sleep 5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Selenium
        run: pip install selenium

      - name: Run Selenium Web Tests
        run: python3 testing/selenium_test.py

      - name: Upload Selenium Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-result
          path: testing/selenium_result.txt
          retention-days: 1

  mobile-test:
    name: Mobile UI Regression Testing (Appium)
    runs-on: macos-13  # macOS is required to run Android hardware acceleration in VM
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        working-directory: frontend_temp
        run: flutter pub get

      - name: Build Flutter APK (x86_64 for Emulator)
        working-directory: frontend_temp
        run: flutter build apk --release --target-platform android-x64

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Appium & UIAutomator2 Driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Start Appium Server
        run: |
          nohup appium > appium.log 2>&1 &
          sleep 5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Appium Tests in Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          script: |
            pip install appium-python-client
            python3 testing/appium_test.py

      - name: Upload Appium Result & APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-artifacts
          path: |
            testing/appium_result.txt
            frontend_temp/build/app/outputs/flutter-apk/*.apk
          retention-days: 1

  report-generation:
    name: Compile Excel QA & Build Report
    needs: [security-scan, web-test, mobile-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Trivy Scan Results
        uses: actions/download-artifact@v4
        with:
          name: trivy-results
          path: testing

      - name: Download Selenium Test Results
        uses: actions/download-artifact@v4
        with:
          name: selenium-result
          path: testing

      - name: Download Mobile Test Results & APK
        uses: actions/download-artifact@v4
        with:
          name: mobile-artifacts
          path: testing-mobile

      - name: Move Mobile Results to testing dir
        run: |
          mkdir -p testing
          mv testing-mobile/testing/appium_result.txt testing/appium_result.txt || true
          mkdir -p frontend_temp/build/app/outputs/flutter-apk
          mv testing-mobile/frontend_temp/build/app/outputs/flutter-apk/*.apk frontend_temp/build/app/outputs/flutter-apk/ || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install openpyxl
        run: pip install openpyxl

      - name: Generate Excel Report
        run: python3 testing/generate_excel_report.py

      - name: Upload Final Deliverables (APK & Excel Report)
        uses: actions/upload-artifact@v4
        with:
          name: QA-Deliverables
          path: |
            testing/build_report.xlsx
            frontend_temp/build/app/outputs/flutter-apk/*.apk
          retention-days: 30
